spring.application.name=backend

server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/patudos_db
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
# Em produção este valor deve vir de uma variável de ambiente, nunca do ficheiro
jwt.secret=patudos-chave-secreta-minimo-32-caracteres-obrigatorio

# ── Logs ─────────────────────────────────────────────────────────────────────
logging.level.com.patudos=DEBUG
logging.level.org.springframework.security=INFO
